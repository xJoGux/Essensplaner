<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Essensplaner</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --bg: #f9fafb;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --danger: #ef4444;
    }
    [data-theme="dark"] {
      --primary: #818cf8;
      --primary-dark: #6366f1;
      --bg: #111827;
      --card: #1f2937;
      --border: #374151;
      --text: #f9fafb;
      --muted: #9ca3af;
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Auth ───────────────────────────────────────────────── */
    .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .auth-card { background: var(--card); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,.09); padding: 2rem; width: 100%; max-width: 400px; }
    .auth-logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin-bottom: .25rem; }
    .auth-sub  { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .auth-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .auth-tab  { flex: 1; padding: .5rem; border: none; background: var(--bg); border-radius: 8px; cursor: pointer; font-size: .9rem; font-weight: 600; color: var(--muted); transition: .15s; }
    .auth-tab.active { background: var(--primary); color: #fff; }

    /* ── Forms ──────────────────────────────────────────────── */
    .fg { margin-bottom: 1rem; }
    label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: .35rem; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: .6rem .75rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .95rem; outline: none; transition: border-color .15s; font-family: inherit;
    }
    input:focus { border-color: var(--primary); }
    .err { display: none; color: var(--danger); font-size: .85rem; background: #fef2f2; padding: .5rem .75rem; border-radius: 6px; margin-bottom: 1rem; }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
           padding: .6rem 1.2rem; border: none; border-radius: 8px; font-size: .9rem;
           font-weight: 600; cursor: pointer; transition: .15s; font-family: inherit; }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-sm  { padding: .35rem .75rem; font-size: .8rem; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Nav ────────────────────────────────────────────────── */
    nav { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-logo  { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
    .nav-links { display: flex; gap: .25rem; }
    .nav-btn   { padding: .4rem .85rem; border-radius: 8px; border: none; background: none;
                 color: var(--muted); font-size: .9rem; font-weight: 500; cursor: pointer; transition: .15s; }
    .nav-btn:hover  { background: var(--bg); }
    .nav-btn.active { background: #eef2ff; color: var(--primary); }
    .nav-user  { display: flex; align-items: center; gap: .75rem; font-size: .9rem; color: var(--muted); }
    .nav-out   { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; text-decoration: underline; }
    .nav-out:hover { color: var(--danger); }

    /* ── Layout ─────────────────────────────────────────────── */
    .main  { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .page  { display: none; }
    .page.active { display: block; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .page-title  { font-size: 1.25rem; font-weight: 700; }

    /* ── View switcher ──────────────────────────────────────── */
    .view-switch { display: flex; gap: .25rem; background: var(--bg); border-radius: 10px; padding: .2rem; border: 1px solid var(--border); }
    .view-btn    { padding: .3rem .75rem; border-radius: 7px; border: none; background: none; font-size: .82rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: .15s; }
    .view-btn.active { background: var(--primary); color: #fff; }

    /* ── Week grid ──────────────────────────────────────────── */
    .week-nav   { display: flex; gap: .5rem; align-items: center; }
    .week-label { font-size: .9rem; color: var(--muted); min-width: 190px; text-align: center; }
    .week-grid  { display: grid; grid-template-columns: repeat(7, 1fr); gap: .75rem; }
    @media (max-width: 900px) { .week-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 500px) { .week-grid { grid-template-columns: 1fr; } }

    /* ── Day view ───────────────────────────────────────────── */
    .day-view-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); max-width: 480px; overflow: hidden; }
    .day-view-card.today { border-color: var(--primary); box-shadow: 0 0 0 2px #c7d2fe; }
    .day-view-head { padding: .9rem 1.25rem; background: #6366f1; color: #fff; }
    .day-view-card.today .day-view-head { background: var(--primary); }
    .day-view-name { font-weight: 700; font-size: 1.1rem; }
    .day-view-date { font-size: .85rem; opacity: .85; }

    /* ── Month grid ─────────────────────────────────────────── */
    .month-grid    { display: grid; grid-template-columns: repeat(7, 1fr); gap: .4rem; }
    .month-header  { display: grid; grid-template-columns: repeat(7, 1fr); gap: .4rem; margin-bottom: .3rem; }
    .month-dname   { text-align: center; font-size: .72rem; font-weight: 700; color: var(--muted); padding: .25rem 0; text-transform: uppercase; }
    .month-cell    { background: var(--card); border: 1px solid var(--border); border-radius: 8px; min-height: 80px; padding: .35rem .4rem; cursor: pointer; transition: border-color .15s; }
    .month-cell:hover { border-color: var(--primary); }
    .month-cell.today { border-color: var(--primary); box-shadow: 0 0 0 2px #c7d2fe; }
    .month-cell.other-month { opacity: .4; }
    .month-num     { font-size: .75rem; font-weight: 700; color: var(--muted); margin-bottom: .25rem; }
    .month-cell.today .month-num { color: var(--primary); }
    .month-meal-dot { font-size: .72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .1rem; }
    @media (max-width: 600px) { .month-cell { min-height: 55px; } .month-meal-dot { display: none; } }

    .day-card   { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .day-card.today { border-color: var(--primary); box-shadow: 0 0 0 2px #c7d2fe; }
    .day-head   { padding: .55rem .875rem; background: #6366f1; color: #fff; }
    .day-card.today .day-head { background: var(--primary); }
    .day-name   { font-weight: 700; font-size: .85rem; }
    .day-date   { font-size: .72rem; opacity: .85; }

    .meal-slot  { padding: .55rem .875rem; border-bottom: 1px solid var(--border); min-height: 52px; }
    .meal-slot:last-child { border-bottom: none; }
    .meal-type  { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: .2rem; }
    .meal-name  { font-size: .85rem; cursor: pointer; min-height: 1.2em; }
    .meal-name:empty::before { content: '+ Mahlzeit'; color: #aaa; font-size: .8rem; }
    .meal-name:hover { color: var(--primary); }
    .meal-edit  { display: flex; gap: .3rem; }
    .meal-input { flex: 1; padding: .25rem .5rem; border: 1.5px solid var(--primary); border-radius: 6px; font-size: .85rem; outline: none; font-family: inherit; }

    /* ── Shopping ───────────────────────────────────────────── */
    .s-list  { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .s-section { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
                 color: var(--muted); padding: .45rem 1rem; background: var(--bg); border-bottom: 1px solid var(--border); }
    .s-item  { display: flex; align-items: center; gap: .75rem; padding: .7rem 1rem; border-bottom: 1px solid var(--border); }
    .s-item:last-of-type { border-bottom: none; }
    .s-item.done .s-text { text-decoration: line-through; color: var(--muted); }
    .s-section.done-section { color: var(--muted); opacity: .7; }
    .s-item input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--primary); flex-shrink: 0; cursor: pointer; }
    .s-text  { flex: 1; font-size: .9rem; }
    .s-del   { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: .2rem .35rem; border-radius: 4px; }
    .s-del:hover { color: var(--danger); background: #fef2f2; }
    .s-add   { display: flex; gap: .5rem; padding: .75rem 1rem; background: var(--bg); border-top: 1px solid var(--border); }
    .s-add input { flex: 1; padding: .5rem .75rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: .9rem; outline: none; font-family: inherit; }
    .s-add input:focus { border-color: var(--primary); }
    .s-add .btn { width: auto; flex-shrink: 0; }
    .empty   { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: .9rem; }

    /* ── Settings ───────────────────────────────────────────── */
    .settings-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 1rem; }
    .settings-row  { display: flex; align-items: center; justify-content: space-between; padding: .9rem 1.25rem; border-bottom: 1px solid var(--border); }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: .95rem; font-weight: 500; }
    .settings-sub   { font-size: .8rem; color: var(--muted); margin-top: .15rem; }
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .88; }

    /* ── Loading ─────────────────────────────────────────────── */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 1rem; color: var(--muted); }
  </style>
</head>
<body>

<!-- ── Loading ───────────────────────────────────────────────────── -->
<div id="loadingScreen" class="loading">Wird geladen …</div>

<!-- ── Auth ─────────────────────────────────────────────────────── -->
<div id="authScreen" class="auth-wrap" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">🍽️ Essensplaner</div>
    <div class="auth-sub">Plane deine Mahlzeiten für die Woche</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Anmelden</button>
      <button class="auth-tab" onclick="showTab('register')">Registrieren</button>
    </div>
    <div id="authErr" class="err"></div>

    <div id="loginForm">
      <div class="fg"><label>Benutzername</label><input type="text" id="lUser" placeholder="dein_name" /></div>
      <div class="fg"><label>Passwort</label><input type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Anmelden</button>
    </div>

    <div id="regForm" style="display:none">
      <div class="fg"><label>Benutzername</label><input type="text" id="rUser" placeholder="dein_name" /></div>
      <div class="fg"><label>Passwort</label><input type="password" id="rPass" placeholder="•••••••• (min. 6 Zeichen)" /></div>
      <div class="fg"><label>Passwort bestätigen</label><input type="password" id="rPass2" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()" /></div>
      <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">Registrieren</button>
    </div>
  </div>
</div>

<!-- ── App ──────────────────────────────────────────────────────── -->
<div id="appScreen" style="display:none">
  <nav>
    <div class="nav-inner">
      <div class="nav-logo">🍽️ Essensplaner</div>
      <div class="nav-links">
        <button class="nav-btn active" id="navPlan" onclick="showPage('plan',this)">Wochenplan</button>
        <button class="nav-btn" id="navShop" onclick="showPage('shopping',this)">Einkaufsliste</button>
        <button class="nav-btn" id="navSettings" onclick="showPage('settings',this)">Einstellungen</button>
      </div>
      <div class="nav-user">
        <span id="navName"></span>
        <button class="nav-out" onclick="doLogout()">Abmelden</button>
      </div>
    </div>
  </nav>

  <div class="main">
    <!-- Wochenplan -->
    <div id="planPage" class="page active">
      <div class="page-header">
        <div class="page-title" id="planTitle">Wochenplan</div>
        <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
          <div class="view-switch">
            <button class="view-btn" id="vDay" onclick="setView('day')">Tag</button>
            <button class="view-btn active" id="vWeek" onclick="setView('week')">Woche</button>
            <button class="view-btn" id="vMonth" onclick="setView('month')">Monat</button>
          </div>
          <div class="week-nav">
            <button class="btn btn-outline btn-sm" onclick="changeOffset(-1)">‹</button>
            <span class="week-label" id="weekLabel"></span>
            <button class="btn btn-outline btn-sm" onclick="changeOffset(1)">›</button>
          </div>
        </div>
      </div>
      <div id="planView"></div>
    </div>

    <!-- Einkaufsliste -->
    <div id="shoppingPage" class="page">
      <div class="page-header">
        <div class="page-title">Einkaufsliste</div>
        <button class="btn btn-outline btn-sm" onclick="renderShopping()">↻ Aktualisieren</button>
      </div>
      <div class="s-list" id="sList"></div>
    </div>

    <!-- Einstellungen -->
    <div id="settingsPage" class="page">
      <div class="page-header">
        <div class="page-title">Einstellungen</div>
      </div>
      <div class="settings-card">
        <div class="settings-row">
          <div>
            <div class="settings-label">Dark Mode</div>
            <div class="settings-sub">Dunkles Farbschema verwenden</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="darkToggle" onchange="toggleDark(this.checked)" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="settings-card">
        <div class="settings-row">
          <div>
            <div class="settings-label">Account löschen</div>
            <div class="settings-sub">Löscht deinen Account und alle gespeicherten Daten unwiderruflich</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteAccount()">Account löschen</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Firebase SDKs ─────────────────────────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// ── Firebase Config ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBqYqgPi_qeSxhmVpeDZcLd8Hl6OotdA_I",
  authDomain: "memorydeck-af728.firebaseapp.com",
  projectId: "memorydeck-af728",
  storageBucket: "memorydeck-af728.firebasestorage.app",
  messagingSenderId: "1077936268943",
  appId: "1:1077936268943:web:9bf39e8a18f3f79068b2fa"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── Constants ────────────────────────────────────────────────────
const DAYS  = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const MEALS = ['Frühstück','Mittagessen','Abendessen'];
const FAKE_DOMAIN = '@essensplaner.app';

// ── State ────────────────────────────────────────────────────────
let currentUser = null;
let currentUid  = null;
let weekOffset  = 0;
let currentView = 'week';
let appData     = { meals: {}, shopping: [], checked: {} };

// ── Helpers ──────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function monday(offset = 0) {
  const d = new Date();
  const dow = d.getDay();
  d.setDate(d.getDate() + (dow === 0 ? -6 : 1 - dow) + offset * 7);
  d.setHours(0, 0, 0, 0);
  return d;
}
const dateKey = d => d.toISOString().slice(0, 10);
const dateFmt = d => d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
const todayKey = () => dateKey(new Date());

function userRef() {
  return db.collection('users').doc(currentUid).collection('data').doc('main');
}

// ── Data (Firestore) ─────────────────────────────────────────────
async function loadData() {
  const doc = await userRef().get();
  if (doc.exists) {
    appData = { meals: {}, shopping: [], checked: {}, ...doc.data() };
  } else {
    appData = { meals: {}, shopping: [], checked: {} };
  }
}

function saveData() {
  userRef().set(appData).catch(console.error);
}

function getMeal(date, mi)      { return appData.meals[date + '_' + mi] || ''; }
function setMeal(date, mi, val) { appData.meals[date + '_' + mi] = val; saveData(); }

// ── Auth ─────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('regForm').style.display   = tab === 'register' ? '' : 'none';
  document.getElementById('authErr').style.display   = 'none';
  document.querySelectorAll('.auth-tab').forEach((el, i) =>
    el.classList.toggle('active', i === (tab === 'login' ? 0 : 1)));
}

function authErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg;
  el.style.display = '';
}

function setBusy(btnId, busy) {
  const btn = document.getElementById(btnId);
  btn.disabled = busy;
  btn.textContent = busy ? 'Bitte warten …' : (btnId === 'loginBtn' ? 'Anmelden' : 'Registrieren');
}

async function doLogin() {
  const user = document.getElementById('lUser').value.trim().toLowerCase();
  const pass = document.getElementById('lPass').value;
  if (!user || !pass) return authErr('Bitte alle Felder ausfüllen.');
  if (!/^[a-z0-9_]+$/.test(user)) return authErr('Nur Buchstaben, Zahlen und _ erlaubt.');

  setBusy('loginBtn', true);
  try {
    await auth.signInWithEmailAndPassword(user + FAKE_DOMAIN, pass);
  } catch (e) {
    authErr('Benutzername oder Passwort falsch.');
    setBusy('loginBtn', false);
  }
}

async function doRegister() {
  const user  = document.getElementById('rUser').value.trim().toLowerCase();
  const pass  = document.getElementById('rPass').value;
  const pass2 = document.getElementById('rPass2').value;
  if (!user || !pass || !pass2) return authErr('Bitte alle Felder ausfüllen.');
  if (!/^[a-z0-9_]+$/.test(user)) return authErr('Nur Buchstaben, Zahlen und _ erlaubt.');
  if (pass !== pass2) return authErr('Passwörter stimmen nicht überein.');
  if (pass.length < 6) return authErr('Passwort muss mindestens 6 Zeichen haben.');

  setBusy('registerBtn', true);
  try {
    const cred = await auth.createUserWithEmailAndPassword(user + FAKE_DOMAIN, pass);
    await db.collection('users').doc(cred.user.uid).set({ username: user });
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      authErr('Benutzername bereits vergeben.');
    } else {
      authErr('Fehler: ' + e.message);
    }
    setBusy('registerBtn', false);
  }
}

async function startSession(uid, username) {
  currentUid  = uid;
  currentUser = username;
  await loadData();
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display  = '';
  document.getElementById('navName').textContent = username;
  renderPlan();
}

function showAuthScreen() {
  currentUid  = null;
  currentUser = null;
  appData     = { meals: {}, shopping: [], checked: {} };
  document.getElementById('appScreen').style.display  = 'none';
  document.getElementById('authScreen').style.display = 'flex';
  setBusy('loginBtn', false);
  setBusy('registerBtn', false);
}

function doLogout() {
  auth.signOut();
}

// ── Firebase Auth State ───────────────────────────────────────────
auth.onAuthStateChanged(async firebaseUser => {
  document.getElementById('loadingScreen').style.display = 'none';
  if (firebaseUser) {
    const profileDoc = await db.collection('users').doc(firebaseUser.uid).get();
    const username = profileDoc.exists ? profileDoc.data().username
                                       : firebaseUser.email.split('@')[0];
    await startSession(firebaseUser.uid, username);
  } else {
    showAuthScreen();
  }
});

// ── Dark Mode ────────────────────────────────────────────────────
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  localStorage.setItem('ep_theme', dark ? 'dark' : 'light');
}

function toggleDark(dark) {
  applyTheme(dark);
}

(function() {
  const saved = localStorage.getItem('ep_theme');
  if (saved === 'dark') applyTheme(true);
})();

// ── Account Deletion ─────────────────────────────────────────────
async function deleteAccount() {
  if (!confirm('Willst du deinen Account und alle deine Daten wirklich unwiderruflich löschen?')) return;
  try {
    await db.collection('users').doc(currentUid).collection('data').doc('main').delete();
    await db.collection('users').doc(currentUid).delete();
    await auth.currentUser.delete();
  } catch (e) {
    if (e.code === 'auth/requires-recent-login') {
      alert('Bitte melde dich ab und erneut an, um deinen Account zu löschen.');
    } else {
      alert('Fehler beim Löschen: ' + e.message);
    }
  }
}

// ── Navigation ───────────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(name + 'Page').classList.add('active');
  btn.classList.add('active');
  if (name === 'shopping') renderShopping();
  if (name === 'settings') {
    document.getElementById('darkToggle').checked =
      localStorage.getItem('ep_theme') === 'dark';
  }
}

// ── View switching ────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  weekOffset  = 0;
  ['day','week','month'].forEach(x => {
    document.getElementById('v' + x.charAt(0).toUpperCase() + x.slice(1))
            .classList.toggle('active', x === v);
  });
  renderPlan();
}

function changeOffset(dir) { weekOffset += dir; renderPlan(); }

function renderPlan() {
  if (currentView === 'week')  renderWeek();
  else if (currentView === 'day') renderDay();
  else renderMonth();
}

// ── Day view ─────────────────────────────────────────────────────
function renderDay() {
  const d = new Date();
  d.setDate(d.getDate() + weekOffset);
  d.setHours(0,0,0,0);
  const dk = dateKey(d);
  const isToday = dk === todayKey();
  const dayIdx  = (d.getDay() + 6) % 7;

  document.getElementById('planTitle').textContent = 'Tagesplan';
  document.getElementById('weekLabel').textContent =
    weekOffset === 0 ? 'Heute' :
    weekOffset === 1 ? 'Morgen' :
    weekOffset === -1 ? 'Gestern' :
    DAYS[dayIdx] + ', ' + dateFmt(d);

  const view = document.getElementById('planView');
  const card = document.createElement('div');
  card.className = 'day-view-card' + (isToday ? ' today' : '');
  card.innerHTML =
    `<div class="day-view-head">
      <div class="day-view-name">${DAYS[dayIdx]}${isToday ? ' ●' : ''}</div>
      <div class="day-view-date">${d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>
    </div>` +
    MEALS.map((m, mi) =>
      `<div class="meal-slot" id="slot_${dk}_${mi}">
        <div class="meal-type">${m}</div>
        <div class="meal-name" onclick="editMeal('${dk}',${mi})">${esc(getMeal(dk, mi))}</div>
      </div>`
    ).join('');

  view.innerHTML = '';
  view.appendChild(card);
}

// ── Week view ─────────────────────────────────────────────────────
function renderWeek() {
  const mon = monday(weekOffset);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);

  document.getElementById('planTitle').textContent = 'Wochenplan';
  document.getElementById('weekLabel').textContent =
    weekOffset ===  0 ? 'Diese Woche' :
    weekOffset ===  1 ? 'Nächste Woche' :
    weekOffset === -1 ? 'Letzte Woche'  :
    dateFmt(mon) + ' – ' + dateFmt(sun);

  const view = document.getElementById('planView');
  const grid = document.createElement('div');
  grid.className = 'week-grid';

  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    const dk = dateKey(d);
    const isToday = dk === todayKey();

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '');
    card.innerHTML =
      `<div class="day-head">
        <div class="day-name">${DAYS[i]}${isToday ? ' ●' : ''}</div>
        <div class="day-date">${dateFmt(d)}</div>
      </div>` +
      MEALS.map((m, mi) =>
        `<div class="meal-slot" id="slot_${dk}_${mi}">
          <div class="meal-type">${m}</div>
          <div class="meal-name" onclick="editMeal('${dk}',${mi})">${esc(getMeal(dk, mi))}</div>
        </div>`
      ).join('');

    grid.appendChild(card);
  }

  view.innerHTML = '';
  view.appendChild(grid);
}

// ── Month view ────────────────────────────────────────────────────
function renderMonth() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth() + weekOffset;
  const first = new Date(year, month, 1);
  const last  = new Date(year, month + 1, 0);

  document.getElementById('planTitle').textContent = 'Monatsplan';
  document.getElementById('weekLabel').textContent =
    first.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

  const view = document.getElementById('planView');
  view.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'month-header';
  DAYS.forEach(n => { hdr.innerHTML += `<div class="month-dname">${n}</div>`; });
  view.appendChild(hdr);

  const grid = document.createElement('div');
  grid.className = 'month-grid';

  const startDow = (first.getDay() + 6) % 7;
  for (let i = 0; i < startDow; i++) {
    const prev = new Date(year, month, 1 - startDow + i);
    grid.appendChild(monthCell(prev, true));
  }

  for (let d = 1; d <= last.getDate(); d++) {
    grid.appendChild(monthCell(new Date(year, month, d), false));
  }

  const total = startDow + last.getDate();
  const remainder = (7 - (total % 7)) % 7;
  for (let i = 1; i <= remainder; i++) {
    grid.appendChild(monthCell(new Date(year, month + 1, i), true));
  }

  view.appendChild(grid);
}

function monthCell(d, otherMonth) {
  const dk = dateKey(d);
  const isToday = dk === todayKey();
  const dayIdx  = (d.getDay() + 6) % 7;

  const cell = document.createElement('div');
  cell.className = 'month-cell' + (isToday ? ' today' : '') + (otherMonth ? ' other-month' : '');
  cell.title = 'Tag anzeigen';

  let html = `<div class="month-num">${d.getDate()}</div>`;
  MEALS.forEach((m, mi) => {
    const val = getMeal(dk, mi);
    if (val) html += `<div class="month-meal-dot" title="${esc(m)}: ${esc(val)}">· ${esc(val)}</div>`;
  });
  cell.innerHTML = html;

  cell.onclick = () => {
    const today = new Date(); today.setHours(0,0,0,0);
    d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    weekOffset = diff;
    document.getElementById('vWeek').classList.remove('active');
    document.getElementById('vMonth').classList.remove('active');
    document.getElementById('vDay').classList.add('active');
    currentView = 'day';
    renderPlan();
  };
  return cell;
}

function editMeal(dk, mi) {
  const slot = document.getElementById(`slot_${dk}_${mi}`);
  const nameEl = slot.querySelector('.meal-name');
  if (slot.querySelector('.meal-edit')) return;
  nameEl.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'meal-edit';
  row.innerHTML =
    `<input class="meal-input" value="${esc(getMeal(dk, mi))}" placeholder="z.B. Pasta" />
     <button class="btn btn-primary btn-sm" onclick="saveMeal('${dk}',${mi},this)">✓</button>`;
  slot.appendChild(row);

  const inp = row.querySelector('input');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  saveMeal(dk, mi, row.querySelector('button'));
    if (e.key === 'Escape') cancelEdit(dk, mi);
  });
}

function saveMeal(dk, mi, btn) {
  const val = btn.closest('.meal-edit').querySelector('input').value.trim();
  setMeal(dk, mi, val);
  renderPlan();
}

function cancelEdit(dk, mi) {
  const slot = document.getElementById(`slot_${dk}_${mi}`);
  const edit = slot.querySelector('.meal-edit');
  if (edit) edit.remove();
  slot.querySelector('.meal-name').style.display = '';
}

// ── Shopping list ─────────────────────────────────────────────────
function renderShopping() {
  const mon = monday(weekOffset);
  const fromPlan = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const dk = dateKey(d);
    for (let mi = 0; mi < 3; mi++) {
      const m = getMeal(dk, mi);
      if (m) fromPlan.push(m);
    }
  }

  const custom = appData.shopping || [];
  const chk    = appData.checked  || {};
  const el     = document.getElementById('sList');
  el.innerHTML = '';

  if (!fromPlan.length && !custom.length) {
    el.innerHTML = '<div class="empty">Keine Einträge. Trage Mahlzeiten im Wochenplan ein!</div>';
    return;
  }

  const planActive = fromPlan.map((item, i) => ({ item, i })).filter(x => !chk['p' + x.i]);
  const planDone   = fromPlan.map((item, i) => ({ item, i })).filter(x => !!chk['p' + x.i]);

  if (planActive.length) {
    el.innerHTML += '<div class="s-section">Aus dem Wochenplan</div>';
    planActive.forEach(({ item, i }) => {
      el.innerHTML += `
        <div class="s-item" id="pi_${i}">
          <input type="checkbox" onchange="togglePlan(${i},this)" />
          <span class="s-text">${esc(item)}</span>
        </div>`;
    });
  }

  const customActive = custom.map((x, i) => ({ ...x, i })).filter(x => !x.done);
  const customDone   = custom.map((x, i) => ({ ...x, i })).filter(x => x.done);

  el.innerHTML += '<div class="s-section">Eigene Artikel</div>';
  customActive.forEach(({ name, i }) => {
    el.innerHTML += `
      <div class="s-item" id="ci_${i}">
        <input type="checkbox" onchange="toggleCustom(${i},this)" />
        <span class="s-text">${esc(name)}</span>
        <button class="s-del" onclick="delCustom(${i})" title="Löschen">✕</button>
      </div>`;
  });

  el.innerHTML += `
    <div class="s-add">
      <input type="text" id="newItem" placeholder="Artikel hinzufügen …" onkeydown="if(event.key==='Enter')addItem()" />
      <button class="btn btn-primary btn-sm" onclick="addItem()">+ Hinzufügen</button>
    </div>`;

  if (planDone.length || customDone.length) {
    el.innerHTML += '<div class="s-section done-section">Erledigt</div>';
    planDone.forEach(({ item, i }) => {
      el.innerHTML += `
        <div class="s-item done">
          <input type="checkbox" checked onchange="togglePlan(${i},this)" />
          <span class="s-text">${esc(item)}</span>
        </div>`;
    });
    customDone.forEach(({ name, i }) => {
      el.innerHTML += `
        <div class="s-item done">
          <input type="checkbox" checked onchange="toggleCustom(${i},this)" />
          <span class="s-text">${esc(name)}</span>
          <button class="s-del" onclick="delCustom(${i})" title="Löschen">✕</button>
        </div>`;
    });
  }
}

function togglePlan(i, cb) {
  if (!appData.checked) appData.checked = {};
  appData.checked['p' + i] = cb.checked;
  saveData();
  renderShopping();
}

function toggleCustom(i, cb) {
  appData.shopping[i].done = cb.checked;
  saveData();
  renderShopping();
}

function delCustom(i) {
  appData.shopping.splice(i, 1);
  saveData();
  renderShopping();
}

function addItem() {
  const inp  = document.getElementById('newItem');
  const name = inp.value.trim();
  if (!name) return;
  appData.shopping.push({ name, done: false });
  saveData();
  inp.value = '';
  renderShopping();
}
</script>
