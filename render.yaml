services:
  - type: web
    name: essensplaner
    runtime: node
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build:frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/data/essensplaner.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
